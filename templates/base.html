<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>
    <title>FastCards</title>
    <style>
        :root {
            --background-color: #292827;
            --surface-color: #363636;
            --primary-text-color: #e0e0e0;
            --accent-color-1: #ff690a;
            --border-color: #444;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--background-color);
            color: var(--primary-text-color);
            margin: 0;
            padding: 2rem;
        }
        h1, h2, h3, h4 { color: var(--accent-color-1); }
        .container { max-width: 800px; margin: 0 auto; }
        .card { 
            background-color: var(--surface-color); 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            border: 1px solid var(--border-color); 
        }
        input[type="text"], input[type="search"] { 
            background-color: #1e1e1e; 
            border: 1px solid var(--border-color); 
            color: #fff; 
            padding: 10px; 
            border-radius: 4px; 
            margin-bottom: 10px;
            font-family: inherit;
            width: 100%;
            box-sizing: border-box;
        }

        textarea { 
            background-color: #1e1e1e; 
            border: 1px solid var(--border-color); 
            color: #fff; 
            padding: 10px; 
            border-radius: 4px; 
            margin-bottom: 10px;
            font-family: inherit;
            width: 100%;
            box-sizing: border-box;
            resize: none; 
            overflow: hidden; 
            min-height: 80px; 
        }
        button, input[type="submit"] { 
            background-color: var(--accent-color-1); 
            color: #fff; 
            border: none; 
            padding: 10px 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        button:hover, input[type="submit"]:hover { background-color: #e55a00; }
        a { color: var(--accent-color-1); text-decoration: none; }
        a:hover { text-decoration: underline; }
        ul { list-style-type: none; padding: 0; }
        li { margin-bottom: 10px; font-size: 1.2rem; }

        .clamped-text {
            display: -webkit-box;
            -webkit-line-clamp: 3; /* Limits visible text to 3 lines */
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            white-space: pre-wrap; 
            word-break: break-word; 
        }
    </style>
</head>
<body hx-on:duplicate-flashcard="alert('Um flashcard com esta mesma frente e verso já existe neste deck!')">
    <div class="container">

        <header style="display: flex; align-items: center; gap: 15px; margin-bottom: 30px;">
            <img src="/static/logo.png" alt="Logo" style="width: 350px; max-width: 100%; height: auto; border-radius: 8px;">
        </header>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
