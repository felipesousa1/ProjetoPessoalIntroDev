<div class="card" id="study-card-container">
    <h2>Frente:</h2>
<p style="font-size: 1.5rem; white-space: pre-wrap;">{{ card.front }}</p>    
    <hr>
    
    <h2>Verso:</h2>
<p style="font-size: 1.5rem; white-space: pre-wrap;">{{ card.back }}</p>
    <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button style="background-color: #d32f2f;" 
                hx-put="/flashcards/{{ card.id }}/review?correct=false" 
                hx-target="#study-card-container" 
                hx-swap="outerHTML">
            Errei
        </button>
        <button style="background-color: #388e3c;" 
                hx-put="/flashcards/{{ card.id }}/review?correct=true" 
                hx-target="#study-card-container" 
                hx-swap="outerHTML">
            Acertei
        </button>
    </div>
</div>
